<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrekshya Maharjan | Portfolio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background-color: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--bg-color);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .title {
            color: var(--accent);
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            text-align: left;
            margin-bottom: 30px;
            border-top: 1px solid #334155;
            padding-top: 25px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .info-label {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .info-value {
            font-weight: 500;
            color: var(--text-main);
        }

        .btn {
            display: inline-block;
            background-color: var(--accent);
            color: var(--bg-color);
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background-color 0.2s ease;
            width: 100%;
        }

        .btn:hover {
            background-color: var(--accent-hover);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar">SM</div>
        
        <h1>Shrekshya Maharjan</h1>
        <div class="title">Frontend Developer</div>

        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">Age</span>
                <span class="info-value">20 Years Old</span>
            </div>
            <div class="info-item">
                <span class="info-label">Education</span>
                <span class="info-value" style="text-align: right;">Advanced College of Engineering and Management</span>
            </div>
        </div>

        <a href="mailto:your.email@example.com" class="btn">Let's Connect</a>
    </div>

</body>
</html>
