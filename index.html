<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shrekshya Maharjan | Portfolio</title>
    <style>
        /* Modern reset and font setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Centered background layout */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Elegant profile card container */
        .profile-card {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* Avatar circle with initials */
        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            line-height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px auto;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        h1 {
            font-size: 24px;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .title {
            font-size: 14px;
            color: #4a5568;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        /* Grid for details */
        .info-grid {
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            padding: 20px 0;
            margin-bottom: 30px;
            text-align: left;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .info-item:last-child {
            margin-bottom: 0;
            align-items: flex-start; /* Aligns long college names gracefully */
        }

        .info-label {
            font-size: 14px;
            color: #718096;
            font-weight: 500;
            min-width: 80px;
        }

        .info-value {
            font-size: 14px;
            color: #1a202c;
            font-weight: 600;
            max-width: 240px;
        }

        /* Interactive Call-to-Action button */
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 15px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
            transition: all 0.3s ease;
        }

        .btn:hover {
            opacity: 0.9;
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar">SM</div>
        
        <h1>Shrekshya Maharjan</h1>
        <div class="title">Frontend Developer</div>

        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">Age</span>
                <span class="info-value">20 Years Old</span>
            </div>
            <div class="info-item">
                <span class="info-label">Education</span>
                <span class="info-value" style="text-align: right;">Advanced College of Engineering and Management</span>
            </div>
        </div>

        <a href="mailto:your.email@example.com" class="btn">Let's Connect</a>
    </div>

</body>
</html>
